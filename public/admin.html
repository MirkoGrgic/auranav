<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraNav - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="logo-icon">
                    <i data-lucide="plane"></i>
                </div>
                <h2>AuraNav <span>Admin</span></h2>
            </div>
            <nav class="sidebar-menu">
                <a href="#" id="menuDashboard" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="#" id="menuTrips"><i class="fa-solid fa-route"></i> Trips</a>
                <hr>
                <a href="/" class="logout-btn"><i class="fa-solid fa-arrow-left"></i> Back to App</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="adminGlobalSearch" placeholder="Search users by name or email...">
                </div>
                <div class="admin-profile">
                    <span id="adminName">Loading...</span>
                    <div class="avatar">A</div>
                </div>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon users-icon"><i class="fa-solid fa-users"></i></div>
                    <div class="stat-info">
                        <h3>Total Users</h3>
                        <p id="statTotalUsers">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon trips-icon"><i class="fa-solid fa-map-location-dot"></i></div>
                    <div class="stat-info">
                        <h3>Total Trips</h3>
                        <p id="statTotalTrips">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon admin-icon"><i class="fa-solid fa-user-shield"></i></div>
                    <div class="stat-info">
                        <h3>Admin Accounts</h3>
                        <p id="statTotalAdmins">0</p>
                    </div>
                </div>
            </section>

            <div id="adminMessage" class="admin-message hidden"></div>

            <section class="management-card">
                <div class="card-header">
                    <h2 id="viewTitle"><i class="fa-solid fa-users-gear"></i> User Management</h2>
                    <div class="header-actions">
                        <button class="btn-success" id="btnAddUser"><i class="fa-solid fa-user-plus"></i> New User</button>
                        <button class="btn-primary" id="btnRefresh"><i class="fa-solid fa-rotate"></i> Refresh</button>
                    </div>
                </div>
                
                <div id="dynamicContentContainer" class="table-responsive">
                    </div>
            </section>
        </main>
    </div>

    <div id="userModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New User</h3>
                <span class="close-modal" id="btnCloseModal">&times;</span>
            </div>
            <form id="modalForm">
                <input type="hidden" id="modalUserId">
                <div class="form-group">
                    <label for="modalFirstName">First Name</label>
                    <input type="text" id="modalFirstName" required>
                </div>
                <div class="form-group">
                    <label for="modalLastName">Last Name</label>
                    <input type="text" id="modalLastName" required>
                </div>
                <div class="form-group">
                    <label for="modalEmail">Email Address</label>
                    <input type="email" id="modalEmail" required>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label for="modalPassword">Password (min. 6 characters)</label>
                    <input type="password" id="modalPassword">
                </div>
                <div class="form-group">
                    <label for="modalRole">Account Role</label>
                    <select id="modalRole">
                        <option value="user">User (Standard Account)</option>
                        <option value="admin">Admin (Full Access)</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary modal-submit-btn">Save Changes</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
