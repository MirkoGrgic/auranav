<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - AuraNav</title>

  <link rel="stylesheet" href="css/signup.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="signup-page">

  <div class="signup-wrapper">

    <!-- LOGO -->
    <a href="/" class="signup-logo">
      <div class="signup-logo-box">
        <i data-lucide="plane"></i>
      </div>
      <span>AuraNav</span>
    </a>

    <!-- CARD -->
    <div class="signup-card">

      <h1 class="signup-title">Create Account</h1>
      <p class="signup-subtitle">Start planning your next adventure</p>

      <!-- SOCIAL -->
      <div class="signup-social">

        <!-- GOOGLE -->
        <button type="button" class="signup-btn">
          <!-- isti SVG -->
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign up with Google
        </button>

        <!-- FACEBOOK -->
        <button type="button" class="signup-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-3h2.5V9.5c0-2.5 1.5-4 3.8-4 1.1 0 2.2.2 2.2.2v2.5H15c-1.2 0-1.5.7-1.5 1.5V12H17l-.5 3h-3v7A10 10 0 0 0 22 12"/>
          </svg>
          Sign up with Facebook
        </button>

      </div>

      <!-- DIVIDER -->
      <div class="signup-divider">
        <span>Or sign up with email</span>
      </div>

      <!-- FORM -->
      <form id="signupForm" class="signup-form">

        <div class="signup-row">

          <div>
            <label>First Name</label>
            <div class="signup-input-box">
              <i data-lucide="user"></i>
              <input id="firstName" class="signup-input with-icon" placeholder="John" required>
            </div>
          </div>

          <div>
            <label>Last Name</label>
            <input id="lastName" class="signup-input" placeholder="Doe" required>
          </div>

        </div>

        <div>
          <label>Email Address</label>
          <div class="signup-input-box">
            <i data-lucide="mail"></i>
            <input id="email" type="email" class="signup-input with-icon" placeholder="you@example.com" required>
          </div>
        </div>

        <div>
          <label>Password</label>
          <div class="signup-input-box">
            <i data-lucide="lock"></i>
            <input id="password" type="password" class="signup-input with-icon" placeholder="••••••••" required>
          </div>
          <p class="signup-note">Must be at least 8 characters</p>
        </div>

        <div class="signup-check">
          <input type="checkbox" required>
          <label>
            I agree to the
            <a href="#">Terms of Service</a> and
            <a href="#">Privacy Policy</a>
          </label>
        </div>

        <div id="signupMessage" class="signup-message"></div>
        <button type="submit" class="signup-submit">Create Account</button>

      </form>

      <!-- LOGIN LINK -->
      <div class="signup-login">
        Already have an account?
        <a href="/login">Log In</a>
      </div>

    </div>

    <!-- BACK -->
    <div class="signup-back">
      <a href="/">← Back to Home</a>
    </div>

  </div>

  <script>
    lucide.createIcons();
  </script>
  <script type="module" src="js/signup.js"></script>
</body>
</html>
